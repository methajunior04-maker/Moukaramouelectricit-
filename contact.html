<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        <img src="logo.jpeg" alt="Logo MOUKARAMOU ELECTRICITE GENERALE">
    </div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
        <a href="apropos.html">À propos</a>
        <a href="boutique.html">Boutique</a>
        <a href="index.html#assistant">Assistant</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<section class="page-banner">

    <img src="banniere.png" alt="Bannière Contact" class="banner-img">

    <h1>Contact</h1>

</section>

<section class="contact-page">

    <div class="contact-info">

        <h2>Nos coordonnées</h2>

        <p>
            <a href="https://www.google.com/maps/search/Medina+Fall+Thies" target="_blank" style="text-decoration: none; color: inherit;">
                <i class="fas fa-map-marker-alt"></i> Medina Fall / Thiès (Voir sur la carte)
            </a>
        </p>

        <p><i class="fab fa-whatsapp"></i> <a href="https://wa.me/221788244825" target="_blank">78 824 48 25</a></p>

        <p><i class="fas fa-envelope"></i> <a href="mailto:ls4777489@gmail.com">ls4777489@gmail.com</a></p>

    </div>

    <form id="contactForm" action="#" method="POST">

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="nom" name="name" placeholder="Nom complet" required aria-label="Votre nom">
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required aria-label="Votre email">
        </div>

        <div class="input-group">
            <i class="fas fa-comment-dots" style="top: 20px;"></i>
            <textarea id="message" name="message" maxlength="500" placeholder="Écrivez votre message ici..." required aria-label="Votre message"></textarea>
        </div>
        <span id="char-counter">0 / 500</span>

        <button type="submit" id="submitBtn">
            Envoyer
        </button>

    </form>

    <div id="successMessage" class="success-box" style="display: none;">
        <i class="fas fa-check-circle"></i>
        <h2>Merci, <span id="displayNom"></span> !</h2>
        <p>Votre message a bien été reçu :</p>
        <blockquote id="displayMsg"></blockquote>
        <button onclick="window.location.reload()" class="btn-retour">Envoyer un autre message</button>
    </div>

</section>

<footer>

    <p>
        © 2026 Mouhamed Toure  - Tous droits réservés
    </p>

</footer>

<a href="https://wa.me/221788244825" class="whatsapp-float" target="_blank" aria-label="Contactez-nous sur WhatsApp">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    // Compteur de caractères pour le message
    const messageArea = document.getElementById('message');
    const counter = document.getElementById('char-counter');
    const contactForm = document.getElementById('contactForm');
    const successBox = document.getElementById('successMessage');

    messageArea.addEventListener('input', () => {
        const length = messageArea.value.length;
        counter.textContent = `${length} / 500`;
        counter.style.color = length > 450 ? '#d40000' : '#666';
    });

    // Simulation d'envoi
    contactForm.addEventListener('submit', async function(e) { // Ajout de 'async' ici
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const nomValeur = document.getElementById('nom').value;
        const msgValeur = document.getElementById('message').value;

        const formURL = 'https://formspree.io/f/mgoqkrwr';

        btn.textContent = "Envoi en cours...";
        btn.style.opacity = "0.7";
        btn.disabled = true; // Désactiver le bouton pour éviter les envois multiples
        
        const formData = new FormData(contactForm); // Récupère toutes les données du formulaire

        try {
            const response = await fetch(formURL, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json' // Important pour que Formspree renvoie une réponse JSON
                }
            });

            if (response.ok) {
                contactForm.style.display = 'none';
                document.getElementById('displayNom').textContent = nomValeur;
                document.getElementById('displayMsg').textContent = `"${msgValeur}"`;
                successBox.style.display = 'block';
            } else {
                const data = await response.json();
                let errorMessage = "Une erreur est survenue lors de l'envoi de votre message.";
                if (data.errors) {
                    errorMessage = `Erreur(s) : ${data.errors.map(error => error.message).join(', ')}`;
                }
                alert(errorMessage);
                btn.textContent = "Envoyer";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Erreur réseau ou autre:', error);
            alert("Une erreur est survenue lors de l'envoi de votre message. Veuillez vérifier votre connexion et réessayer.");
            btn.textContent = "Envoyer";
            btn.style.opacity = "1";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
