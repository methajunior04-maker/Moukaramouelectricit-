<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moukaramou Electric - Assistant IA</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.chat{
max-width:600px;
margin:40px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

#messages{
height:350px;
overflow:auto;
padding:10px;
border:1px solid #ddd;
}

.msg{
margin:10px;
padding:10px;
border-radius:8px;
}

.user{
background:#ffd54f;
}

.bot{
background:#e3f2fd;
}

input{
width:75%;
padding:10px;
}

button{
padding:10px;
background:#007bff;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="chat">

<h2>⚡ Assistant IA - Moukaramou Electric</h2>

<div id="messages"></div>

<input
id="question"
placeholder="Posez votre question..."
>

<button onclick="ask()">
Envoyer
</button>

</div>

<script>

function ask(){

let q =
document.getElementById(
"question"
).value;

if(!q) return;

add(q,"user");

let r="";

if(q.includes("prix")){

r="Nos prix varient selon le service.";

}

else if(q.includes("installation")){

r="Nous faisons installation électrique complète.";

}

else if(q.includes("camera")){

r="Nous installons des caméras de surveillance.";

}

else{

r="Bonjour, contactez Moukaramou Electric sur WhatsApp.";

}

add(r,"bot");

document
.getElementById(
"question"
).value="";

}

function add(text,type){

document
.getElementById(
"messages"
)
.innerHTML+=
`
<div class="msg ${type}">
${text}
</div>
`;

}

</script>

</body>
</html>
