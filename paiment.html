<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="logo.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.jpeg" alt="Logo MOUKARAMOU ELECTRICITE GENERALE">
    </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
        <a href="apropos.html">À propos</a>
        <a href="boutique.html">Boutique</a>
        <a href="devis.html">Devis</a>
        <a href="index.html#assistant">Assistant</a>
        <a href="contact.html">Contact</a>
        <a href="panier.html" style="color: #ffd000;"><i class="fas fa-shopping-cart"></i> <span id="nb">0</span></a>
    </nav>
</header>

<section class="page-banner">
    <img src="banniere.png" alt="Bannière Paiment" class="banner-img">
    <h1 style="position: relative; z-index: 3;">Paiment</h1>
</section>

<section class="paiment-page">
    <h1>Finaliser votre commande</h1>
    <form id="payForm">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="p_nom" placeholder="Nom complet" required>
        </div>
        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="p_tel" placeholder="Téléphone" required>
        </div>
        <div class="input-group">
            <i class="fas fa-wallet" style="top: 22px;"></i>
            <select id="p_mode" required>
                <option value="" disabled selected>Mode de paiment</option>
                <option>Wave</option>
                <option>Orange Money</option>
                <option>Paiment à la livraison</option>
            </select>
        </div>
        <button type="submit" style="width: 100%;">Valider le paiment</button>
    </form>
</section>

<footer>
    <p>© 2026 Mouhamed Toure - Tous droits réservés</p>
</footer>

<a href="https://wa.me/221788244825" class="whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    document.getElementById('payForm').onsubmit = function(e) {
        e.preventDefault();
        
        const nom = document.getElementById('p_nom').value;
        const tel = document.getElementById('p_tel').value;
        const mode = document.getElementById('p_mode').value;
        
        // Récupérer les produits du panier
        const panier = JSON.parse(localStorage.getItem('panier')) || [];
        if(panier.length === 0) {
            alert("Votre panier est vide !");
            return;
        }
        
        const listeProduits = panier.join(", ");
        
        // Créer le message WhatsApp
        const message = `Bonjour MEG, je souhaite finaliser ma commande.\n\n👤 *Client:* ${nom}\n📞 *Tel:* ${tel}\n💰 *Mode:* ${mode}\n🛒 *Produits:* ${listeProduits}`;
        
        // Ouvrir WhatsApp avec le message pré-rempli
        const whatsappUrl = `https://wa.me/221788244825?text=${encodeURIComponent(message)}`;
        window.open(whatsappUrl, '_blank');
    };
</script>

</body>
</html>
